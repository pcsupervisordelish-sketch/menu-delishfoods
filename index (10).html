<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>เมนูใช้งาน PC — Delish Foods</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Sarabun', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    position: relative;
    overflow: hidden;
    background: #c8d8a0;
  }

  /* Gradient mesh background — เหมือนในรูป */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    background:
      radial-gradient(ellipse 80% 80% at 0% 0%,   #d4e8a0 0%, transparent 60%),
      radial-gradient(ellipse 70% 70% at 100% 0%,  #a0b8e8 0%, transparent 60%),
      radial-gradient(ellipse 60% 60% at 50% 100%, #b8c8f0 0%, transparent 70%),
      radial-gradient(ellipse 80% 50% at 30% 60%,  #c8d8b0 0%, transparent 50%);
    background-color: #c8d4b0;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { filter: hue-rotate(0deg) brightness(1); }
    100% { filter: hue-rotate(8deg) brightness(1.04); }
  }

  /* Noise overlay */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.5;
    pointer-events: none;
  }

  /* MAIN CONTAINER */
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 420px;
    animation: fadeUp 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(28px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* LOGO */
  .logo-wrap {
    margin-bottom: 20px;
    animation: fadeUp 0.6s 0.1s cubic-bezier(.22,1,.36,1) both;
  }

  .logo-circle {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    background: #1a4a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(26,74,46,.35), 0 2px 8px rgba(0,0,0,.15);
    border: 3px solid rgba(255,255,255,.15);
  }

  .logo-circle .logo-d  { font-size:22px; font-weight:800; color:#fff; font-family:'Georgia',serif; line-height:1; }
  .logo-circle .logo-f  { font-size:18px; font-weight:700; color:#fff; font-family:'Georgia',serif; line-height:1; }

  /* TITLE */
  .title {
    font-size: clamp(28px, 7vw, 38px);
    font-weight: 800;
    color: #fff;
    text-align: center;
    margin-bottom: 28px;
    text-shadow: 0 2px 16px rgba(0,0,0,.18);
    letter-spacing: -0.5px;
    animation: fadeUp 0.6s 0.18s cubic-bezier(.22,1,.36,1) both;
  }

  /* CARD */
  .card {
    width: 100%;
    background: rgba(255,255,255,.22);
    backdrop-filter: blur(20px) saturate(1.4);
    -webkit-backdrop-filter: blur(20px) saturate(1.4);
    border: 1.5px solid rgba(255,255,255,.45);
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 40px rgba(0,0,0,.12), 0 1px 0 rgba(255,255,255,.6) inset;
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.6s 0.26s cubic-bezier(.22,1,.36,1) both;
  }

  /* BUTTONS */
  .btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-radius: 14px;
    text-decoration: none;
    font-family: 'Sarabun', sans-serif;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: transform .18s cubic-bezier(.22,1,.36,1), box-shadow .18s;
    letter-spacing: 0.2px;
  }

  .btn:hover  { transform: translateY(-2px) scale(1.01); }
  .btn:active { transform: translateY(0) scale(.98); }

  /* ripple */
  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,.15);
    opacity: 0;
    transition: opacity .2s;
  }
  .btn:hover::after { opacity: 1; }

  /* btn 1 — lime green */
  .btn-checkin {
    background: linear-gradient(135deg, #aaee44 0%, #88dd22 100%);
    box-shadow: 0 4px 20px rgba(136,220,34,.4);
    color: #1a3a00;
  }
  .btn-checkin:hover { box-shadow: 0 8px 28px rgba(136,220,34,.55); }

  /* btn 2 — cyan blue */
  .btn-fridge {
    background: linear-gradient(135deg, #22ccff 0%, #00aaee 100%);
    box-shadow: 0 4px 20px rgba(0,170,238,.4);
  }
  .btn-fridge:hover { box-shadow: 0 8px 28px rgba(0,170,238,.55); }

  /* btn 3 — orange */
  .btn-booth {
    background: linear-gradient(135deg, #ffcc00 0%, #ff9900 100%);
    box-shadow: 0 4px 20px rgba(255,153,0,.4);
    color: #3a2000;
  }
  .btn-booth:hover { box-shadow: 0 8px 28px rgba(255,153,0,.55); }

  .btn-label { flex: 1; }
  .btn-icon  { font-size: 20px; flex-shrink: 0; margin-left: 10px; }

  /* SOCIAL ICONS */
  .socials {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: 24px;
    animation: fadeUp 0.6s 0.36s cubic-bezier(.22,1,.36,1) both;
  }

  .social-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: rgba(255,255,255,.28);
    border: 1.5px solid rgba(255,255,255,.5);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all .2s;
    text-decoration: none;
    color: #fff;
    font-size: 20px;
  }
  .social-btn:hover {
    background: rgba(255,255,255,.45);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }

  /* SVG icons */
  .icon-svg { width:22px; height:22px; fill:rgba(255,255,255,.9); }
</style>
</head>
<body>

<div class="bg"></div>

<div class="container">

  <!-- Logo -->
  <div class="logo-wrap">
    <div class="logo-circle">
      <span class="logo-d">Delish</span>
      <span class="logo-f">Foods</span>
    </div>
  </div>

  <!-- Title -->
  <div class="title">เลือกสิ่งที่ต้องการ</div>

  <!-- Card with buttons -->
  <div class="card">

    <!-- Check-in -->
    <a class="btn btn-checkin" href="https://pcsupervisordelish-sketch.github.io/check-in/" target="_blank">
      <span class="btn-label">Check-In ลงเวลา</span>
      <span class="btn-icon">
        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="rgba(26,58,0,.7)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </span>
    </a>

    <!-- ตู้แช่ -->
    <a class="btn btn-fridge" href="https://shorturl.asia/GgYfC" target="_blank">
      <span class="btn-label">ตู้แช่ สั่งสินค้า</span>
      <span class="btn-icon">
        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
    </a>

    <!-- บูธเปลือย -->
    <a class="btn btn-booth" href="https://shorturl.asia/GxQRC" target="_blank">
      <span class="btn-label">บูธเปลือย สั่งสินค้า/แจ้งยอดขาย</span>
      <span class="btn-icon">
        <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="rgba(58,32,0,.7)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
      </span>
    </a>

  </div>

  <!-- Social icons -->
  <div class="socials">
    <!-- Phone -->
    <a class="social-btn" href="tel:" title="โทรศัพท์">
      <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.44 2 2 0 0 1 3.56 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 9.91a16 16 0 0 0 6.06 6.06l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
    </a>
    <!-- Email -->
    <a class="social-btn" href="mailto:billy200993@hotmail.com" title="อีเมล">
      <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
      </svg>
    </a>
    <!-- Facebook -->
    <a class="social-btn" href="https://facebook.com" target="_blank" title="Facebook">
      <svg class="icon-svg" viewBox="0 0 24 24" fill="rgba(255,255,255,.9)">
        <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
      </svg>
    </a>
  </div>

</div>

</body>
</html>
